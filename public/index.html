<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuelScan — UK Fuel Prices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">⛽</span>
        <span class="logo-text">FuelScan</span>
      </div>
      <div class="header-right">
        <button id="reset-profile-btn" class="btn-icon-sm" title="Reset data profile">↺</button>
        <a href="/check.html" class="check-link" title="API diagnostic tool">✓</a>
      </div>
    </header>

    <!-- Search panel -->
    <div class="search-panel">
      <div class="search-row">
        <input id="postcode-input" type="text" placeholder="Postcode…" maxlength="8" autocomplete="off" />
        <button id="search-btn" class="btn-primary">Search</button>
        <button id="gps-btn" class="btn-icon" title="Use my location">📍</button>
        <button id="fav-btn" class="btn-icon btn-fav" title="Search favourite" disabled>★</button>
      </div>
      <div class="search-options">
        <label>Radius
          <select id="radius-select">
            <option value="2">2 mi</option>
            <option value="5" selected>5 mi</option>
            <option value="10">10 mi</option>
            <option value="20">20 mi</option>
          </select>
        </label>
        <label>Fuel
          <select id="fuel-select">
            <option value="E10">Petrol (E10)</option>
            <option value="E5">Petrol (E5)</option>
            <option value="B7_STANDARD">Diesel</option>
            <option value="B7_PREMIUM">Diesel Premium</option>
          </select>
        </label>
      </div>
    </div>

    <!-- Status / progress (auto-hides after search) -->
    <div id="status" class="status hidden"></div>

    <!-- Summary bar -->
    <div id="summary-bar" class="summary-bar hidden">
      <div class="summary-item summary-best">
        <div class="summary-label">Cheapest</div>
        <div class="summary-name" id="sum-cheap-name">—</div>
        <div class="summary-price" id="sum-cheap-price">—</div>
        <div class="summary-fill" id="sum-cheap-fill">—</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item summary-worst">
        <div class="summary-label">Priciest</div>
        <div class="summary-name" id="sum-exp-name">—</div>
        <div class="summary-price" id="sum-exp-price">—</div>
        <div class="summary-fill" id="sum-exp-fill">—</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item summary-saving">
        <div class="summary-label">Save / 60L</div>
        <div class="summary-saving-val" id="sum-saving">—</div>
        <div class="summary-fill" id="sum-saving-desc"></div>
      </div>
    </div>

    <!-- Map (always visible after search) -->
    <div id="map-wrap" class="map-wrap hidden">
      <div id="map"></div>
      <button id="search-here-btn" class="search-here-btn hidden">🔍 Search here</button>
    </div>

    <!-- Results list -->
    <div id="results" class="results hidden">
      <div class="results-header">
        <h2 id="results-title">Nearby Stations</h2>
        <span id="results-meta" class="results-meta"></span>
      </div>
      <div id="station-list" class="station-list"></div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="index.js"></script>
</body>
</html>
