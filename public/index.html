<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuelScan — API Test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>FuelScan <span class="tag">API Test</span></h1>
    <p class="subtitle">Fetch one batch of stations from the UK Gov Fuel Finder API and inspect the results.</p>

    <div class="controls">
      <label for="batch-input">Batch number</label>
      <input id="batch-input" type="number" value="1" min="1" max="50" />
      <button id="fetch-btn">Fetch Batch</button>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="stats" class="stats hidden">
      <div class="stat"><span class="stat-label">Batch</span><span id="s-batch" class="stat-value">—</span></div>
      <div class="stat"><span class="stat-label">Stations in batch</span><span id="s-count" class="stat-value">—</span></div>
      <div class="stat"><span class="stat-label">Fields per station</span><span id="s-fields" class="stat-value">—</span></div>
      <div class="stat"><span class="stat-label">Fetch time</span><span id="s-time" class="stat-value">—</span></div>
    </div>

    <div id="fields-row" class="fields-row hidden">
      <strong>Fields returned:</strong>
      <span id="fields-list"></span>
    </div>

    <div id="table-wrap" class="table-wrap hidden">
      <h2>First 10 Stations</h2>
      <div class="table-scroll">
        <table id="station-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="raw-wrap" class="raw-wrap hidden">
      <h2>Raw JSON (first station)</h2>
      <pre id="raw-json"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
