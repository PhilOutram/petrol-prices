<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuelScan — UK Fuel Prices</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <div class="page-header">
      <div class="header-left">
        <h1>⛽ FuelScan</h1>
        <p class="subtitle">Find the cheapest fuel near you</p>
      </div>
      <a href="/check.html" class="check-link" title="API diagnostic tool">✓</a>
    </div>

    <!-- Search -->
    <div class="search-card">
      <div class="search-row">
        <input id="postcode-input" type="text" placeholder="Enter postcode…" maxlength="8" />
        <button id="search-btn" class="btn-primary">Search</button>
        <button id="gps-btn" class="btn-secondary" title="Use my location">📍</button>
      </div>
      <div class="search-options">
        <label>Radius:
          <select id="radius-select">
            <option value="2">2 miles</option>
            <option value="5" selected>5 miles</option>
            <option value="10">10 miles</option>
            <option value="20">20 miles</option>
          </select>
        </label>
        <label>Fuel:
          <select id="fuel-select">
            <option value="E10">Petrol (E10)</option>
            <option value="E5">Petrol (E5)</option>
            <option value="B7_STANDARD">Diesel</option>
            <option value="B7_PREMIUM">Diesel Premium</option>
          </select>
        </label>
      </div>
    </div>

    <div id="status" class="status hidden"></div>

    <!-- Profile info bar -->
    <div id="profile-bar" class="profile-bar hidden">
      <span id="profile-text"></span>
      <button id="reset-profile-btn" class="btn-ghost" title="Clear saved profile and do full search">↺ Reset</button>
    </div>

    <!-- Results -->
    <div id="results" class="results hidden">
      <div class="results-header">
        <h2 id="results-title">Nearby Stations</h2>
        <span id="results-meta" class="results-meta"></span>
      </div>
      <div id="station-list" class="station-list"></div>
    </div>

  </div>
  <script src="index.js"></script>
</body>
</html>
